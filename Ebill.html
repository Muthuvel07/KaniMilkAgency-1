<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kani Milk Agency - E-Bill</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0faf0;color:#222;}
header{background:linear-gradient(135deg,#087f23,#1b5e20);color:white;text-align:center;padding:24px 20px;}
header h1{font-size:1.6rem;font-weight:700;}
header p{font-size:0.9rem;opacity:0.85;margin-top:4px;}
header a.back{position:absolute;left:16px;top:16px;color:white;text-decoration:none;font-size:0.85rem;background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;}
header{position:relative;}

.login-section{display:flex;justify-content:center;padding:60px 20px;}
.login-card{background:white;max-width:360px;width:100%;padding:32px 28px;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,0.1);display:flex;flex-direction:column;gap:14px;}
.login-card h2{color:#087f23;text-align:center;margin-bottom:6px;}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:0.95rem;font-family:inherit;}
.login-card input:focus{outline:none;border-color:#087f23;}
#loginBtn{background:#087f23;color:white;border:none;padding:14px;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;}
#loginBtn:hover{background:#1b5e20;}
#loginBtn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{padding:12px;border-radius:10px;font-size:0.88rem;text-align:center;}
.msg.success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.msg.error{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;}

.app-section{max-width:900px;margin:0 auto;padding:24px 16px 60px;display:none;}
.app-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:20px;}
#roleLabel{font-size:0.75rem;font-weight:700;padding:4px 10px;border-radius:20px;color:white;background:#1976d2;}
#logoutBtn{background:white;color:#087f23;border:1.5px solid #087f23;padding:10px 18px;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;}
#logoutBtn:hover{background:#087f23;color:white;}

.tabs{display:flex;gap:10px;margin-bottom:18px;}
.tab-btn{background:white;border:1.5px solid #087f23;color:#087f23;padding:10px 18px;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;}
.tab-btn.active{background:#087f23;color:white;}

.card-box{background:white;border-radius:16px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:20px;}
.card-box h3{color:#1b5e20;margin-bottom:14px;font-size:1.05rem;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card-box input, .card-box textarea, .card-box select{width:100%;padding:11px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:0.92rem;font-family:inherit;}
.card-box input:focus, .card-box textarea:focus, .card-box select:focus{outline:none;border-color:#087f23;}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:center;margin-top:12px;}
.add-item-btn{background:#1976d2;color:white;border:none;padding:11px;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:12px;}
.add-item-btn:hover{background:#125aa0;}

table.items-table{width:100%;border-collapse:collapse;margin-top:18px;font-size:0.9rem;}
table.items-table th, table.items-table td{padding:9px 8px;text-align:left;border-bottom:1px solid #eee;}
table.items-table th{color:#555;font-size:0.8rem;text-transform:uppercase;}
.rm-btn{background:#fce4ec;color:#c62828;border:1.5px solid #ef9a9a;padding:5px 10px;border-radius:8px;font-size:0.78rem;cursor:pointer;}
.rm-btn:hover{background:#c62828;color:white;}
.grand-total{text-align:right;font-size:1.15rem;font-weight:700;color:#087f23;margin-top:14px;}
.save-btn{background:#087f23;color:white;border:none;padding:14px;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;width:100%;margin-top:16px;}
.save-btn:hover{background:#1b5e20;}
.save-btn:disabled{opacity:0.6;cursor:not-allowed;}

.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-bar input{flex:1;min-width:180px;padding:10px 14px;border-radius:10px;border:1.5px solid #ddd;font-size:0.9rem;}
.empty{text-align:center;color:#777;padding:40px 0;}
.bill-card{background:white;border-radius:16px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:12px;}
.bill-card-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.bill-card-head strong{color:#1b5e20;font-size:1.02rem;}
.bill-card p{font-size:0.85rem;color:#444;margin-top:4px;}
.bill-actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.view-btn{background:#1976d2;color:white;border:none;padding:8px 14px;border-radius:8px;font-size:0.82rem;cursor:pointer;}
.view-btn:hover{background:#125aa0;}
.del-btn{background:#fce4ec;color:#c62828;border:1.5px solid #ef9a9a;padding:8px 14px;border-radius:8px;font-size:0.82rem;cursor:pointer;}
.del-btn:hover{background:#c62828;color:white;}

/* Invoice modal */
#invoiceOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;}
#invoiceBox{background:white;max-width:420px;width:100%;border-radius:14px;padding:28px 26px;position:relative;}
#invoiceBox h2{color:#087f23;text-align:center;}
#invoiceBox .sub{text-align:center;font-size:0.8rem;color:#666;margin-bottom:14px;}
#invoiceBox table{width:100%;border-collapse:collapse;margin:14px 0;font-size:0.88rem;}
#invoiceBox table th, #invoiceBox table td{padding:6px 4px;text-align:left;border-bottom:1px solid #eee;}
#invoiceBox .inv-total{text-align:right;font-weight:700;font-size:1.05rem;color:#087f23;margin-top:8px;}
#invoiceBox .inv-meta{font-size:0.85rem;color:#333;margin-bottom:4px;}
.inv-actions{display:flex;gap:10px;margin-top:18px;}
.inv-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:0.9rem;font-weight:600;cursor:pointer;}
#printInvBtn{background:#087f23;color:white;}
#closeInvBtn{background:#eee;color:#333;}

@media print{
  body *{visibility:hidden;}
  #invoiceBox, #invoiceBox *{visibility:visible;}
  #invoiceBox{position:absolute;top:0;left:0;width:100%;box-shadow:none;}
  .inv-actions{display:none;}
  #invoiceOverlay{position:absolute;background:white;padding:0;}
}
@media(max-width:600px){
  .grid2{grid-template-columns:1fr;}
  .item-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">&larr; Home</a>
  <h1>Kani Milk Agency</h1>
  <p>E-Billing System</p>
</header>

<div id="loginSection" class="login-section">
  <div class="login-card">
    <h2>Admin Login</h2>
    <input id="loginUsername" type="text" placeholder="Username (owner or developer)" autocomplete="username">
    <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
    <div id="loginMsg" class="msg" style="display:none;"></div>
    <button id="loginBtn" onclick="adminLogin()">Login</button>
  </div>
</div>

<section id="appSection" class="app-section">
  <div class="app-top">
    <span id="roleLabel">Owner</span>
    <button id="logoutBtn" onclick="adminLogout()">Logout</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabNewBtn" onclick="switchTab('new')">🧾 New Bill</button>
    <button class="tab-btn" id="tabHistoryBtn" onclick="switchTab('history')">📜 Bill History</button>
  </div>

  <!-- NEW BILL TAB -->
  <div id="newBillTab">
    <div class="card-box">
      <h3>Customer Details</h3>
      <div class="grid2">
        <input id="custName" type="text" placeholder="Customer Name">
        <input id="custPhone" type="tel" placeholder="Phone Number" maxlength="10">
      </div>
      <textarea id="custAddress" placeholder="Address (optional)" rows="2" style="margin-top:12px;"></textarea>
    </div>

    <div class="card-box">
      <h3>Add Items</h3>
      <div class="item-row">
        <select id="itemProduct"></select>
        <input id="itemQty" type="number" min="1" value="1" placeholder="Qty">
        <input id="itemUnitPrice" type="text" readonly>
        <button class="add-item-btn" onclick="addItem()">+ Add</button>
      </div>

      <table class="items-table" id="itemsTable" style="display:none;">
        <thead><tr><th>Product</th><th>Qty</th><th>Unit ₹</th><th>Subtotal ₹</th><th></th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <div class="grand-total">Grand Total: ₹<span id="grandTotal">0</span></div>

      <button class="save-btn" id="saveBillBtn" onclick="saveBill()">💾 Save & Generate Bill</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="historyTab" style="display:none;">
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search by name or phone..." oninput="renderBills()">
    </div>
    <div id="dashMsg" class="msg" style="display:none;margin-bottom:14px;"></div>
    <div id="billsList"></div>
  </div>
</section>

<!-- INVOICE MODAL -->
<div id="invoiceOverlay">
  <div id="invoiceBox">
    <h2>Kani Milk Agency</h2>
    <p class="sub">Fresh Milk • Daily Delivery • Pure Quality<br>📞 8838416013</p>
    <p class="inv-meta"><strong>Bill No:</strong> <span id="invBillNo"></span></p>
    <p class="inv-meta"><strong>Date:</strong> <span id="invDate"></span></p>
    <p class="inv-meta"><strong>Customer:</strong> <span id="invCustName"></span></p>
    <p class="inv-meta"><strong>Phone:</strong> <span id="invCustPhone"></span></p>
    <p class="inv-meta" id="invAddressRow"><strong>Address:</strong> <span id="invCustAddress"></span></p>
    <table>
      <thead><tr><th>Product</th><th>Qty</th><th>Unit ₹</th><th>Amt ₹</th></tr></thead>
      <tbody id="invItemsBody"></tbody>
    </table>
    <div class="inv-total">Total: ₹<span id="invGrandTotal"></span></div>
    <div class="inv-actions">
      <button id="printInvBtn" onclick="window.print()">🖨️ Print</button>
      <button id="closeInvBtn" onclick="closeInvoice()">Close</button>
    </div>
  </div>
</div>

<!-- FIREBASE v8 CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// Same Firebase project as index.html
firebase.initializeApp({
  apiKey: "AIzaSyAQAY_wXDlU5twKU9DLZCh3lgfBfLAy7AQ",
  authDomain: "kani-milk-agency-9323b.firebaseapp.com",
  projectId: "kani-milk-agency-9323b",
  storageBucket: "kani-milk-agency-9323b.firebasestorage.app",
  messagingSenderId: "317392951345",
  appId: "1:317392951345:web:1768ca6b7725812491dd10"
});
var db = firebase.firestore();
var auth = firebase.auth();
var ADMIN_EMAIL_DOMAIN = "@kani-admin.local";

// ===== Price list (approx, editable here) =====
var PRICE_LIST = [
  { name: "Enriched Toned Milk (1 L)", price: 59 },
  { name: "Rich Toned Milk (1 L)", price: 67 },
  { name: "Blue Toned Milk (1 L)", price: 59 },
  { name: "Full Cream Toned Milk (1 L)", price: 76 },
  { name: "Cow Milk (1 L)", price: 76 },
  { name: "Standardized Milk (1 L)", price: 67 },
  { name: "Green Toned Curd (500 ml)", price: 44 },
  { name: "Toned Curd (500 g)", price: 44 },
  { name: "Little Curd (200 g)", price: 23 },
  { name: "Strawberry Milk (50 ml)", price: 10 },
  { name: "Chocolate Milk", price: 30 },
  { name: "Gold Ice Cream", price: 50 }
];

var currentRole = null;
var currentItems = [];
var allBills = [];
var unsubscribeBills = null;

// ---------- init product dropdown ----------
(function populateProducts() {
  var sel = document.getElementById("itemProduct");
  PRICE_LIST.forEach(function(p, i) {
    var opt = document.createElement("option");
    opt.value = i;
    opt.textContent = p.name + " - ₹" + p.price;
    sel.appendChild(opt);
  });
  updateUnitPrice();
  sel.addEventListener("change", updateUnitPrice);
})();

function updateUnitPrice() {
  var idx = document.getElementById("itemProduct").value;
  document.getElementById("itemUnitPrice").value = "₹" + PRICE_LIST[idx].price;
}

function showMsg(elId, text, type) {
  var el = document.getElementById(elId);
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
}

// ---------- AUTH ----------
auth.onAuthStateChanged(function(user) {
  if (user) {
    currentRole = (user.email === "developer" + ADMIN_EMAIL_DOMAIN) ? "developer" : "owner";
    var roleLabel = document.getElementById("roleLabel");
    roleLabel.textContent = (currentRole === "owner") ? "Owner" : "Developer (view only)";
    roleLabel.style.background = (currentRole === "owner") ? "#1976d2" : "#7b1fa2";

    document.getElementById("saveBillBtn").style.display = (currentRole === "owner") ? "block" : "none";

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("appSection").style.display = "block";
    listenForBills();
  } else {
    currentRole = null;
    document.getElementById("appSection").style.display = "none";
    document.getElementById("loginSection").style.display = "flex";
    if (unsubscribeBills) { unsubscribeBills(); unsubscribeBills = null; }
    allBills = [];
  }
});

function adminLogin() {
  var username = document.getElementById("loginUsername").value.trim().toLowerCase();
  var password = document.getElementById("loginPassword").value;
  if (!username || !password) {
    showMsg("loginMsg", "⚠️ Enter username and password.", "error");
    return;
  }
  var btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "Logging in...";
  auth.signInWithEmailAndPassword(username + ADMIN_EMAIL_DOMAIN, password)
    .catch(function(err) {
      showMsg("loginMsg", "❌ [" + err.code + "] " + err.message, "error");
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = "Login";
    });
}

function adminLogout() {
  auth.signOut();
}

// ---------- TABS ----------
function switchTab(tab) {
  document.getElementById("newBillTab").style.display = (tab === "new") ? "block" : "none";
  document.getElementById("historyTab").style.display = (tab === "history") ? "block" : "none";
  document.getElementById("tabNewBtn").classList.toggle("active", tab === "new");
  document.getElementById("tabHistoryBtn").classList.toggle("active", tab === "history");
}

// ---------- NEW BILL ----------
function addItem() {
  var idx = parseInt(document.getElementById("itemProduct").value, 10);
  var qty = parseInt(document.getElementById("itemQty").value, 10);
  if (!qty || qty < 1) { alert("Enter a valid quantity."); return; }
  var product = PRICE_LIST[idx];
  currentItems.push({
    name: product.name,
    unitPrice: product.price,
    qty: qty,
    subtotal: product.price * qty
  });
  document.getElementById("itemQty").value = 1;
  renderItems();
}

function removeItem(i) {
  currentItems.splice(i, 1);
  renderItems();
}

function renderItems() {
  var body = document.getElementById("itemsBody");
  var table = document.getElementById("itemsTable");
  if (currentItems.length === 0) {
    table.style.display = "none";
    body.innerHTML = "";
    document.getElementById("grandTotal").textContent = "0";
    return;
  }
  table.style.display = "table";
  var total = 0;
  body.innerHTML = currentItems.map(function(it, i) {
    total += it.subtotal;
    return "<tr><td>" + escapeHtml(it.name) + "</td><td>" + it.qty + "</td><td>" + it.unitPrice +
      "</td><td>" + it.subtotal + "</td><td><button class='rm-btn' onclick='removeItem(" + i + ")'>Remove</button></td></tr>";
  }).join("");
  document.getElementById("grandTotal").textContent = total;
}

function escapeHtml(str) {
  if (str === undefined || str === null) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function saveBill() {
  if (currentRole !== "owner") return;
  var name = document.getElementById("custName").value.trim();
  var phone = document.getElementById("custPhone").value.trim();
  var address = document.getElementById("custAddress").value.trim();

  if (!name || !phone) { alert("Enter customer name and phone number."); return; }
  if (currentItems.length === 0) { alert("Add at least one item."); return; }

  var btn = document.getElementById("saveBillBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  var total = currentItems.reduce(function(s, it) { return s + it.subtotal; }, 0);
  var counterRef = db.collection("meta").doc("billCounter");

  db.runTransaction(function(tx) {
    return tx.get(counterRef).then(function(doc) {
      var next = (doc.exists ? doc.data().value : 0) + 1;
      tx.set(counterRef, { value: next });
      return next;
    });
  }).then(function(billNo) {
    var billData = {
      billNo: billNo,
      custName: name,
      custPhone: phone,
      custAddress: address,
      items: currentItems,
      total: total,
      time: firebase.firestore.FieldValue.serverTimestamp()
    };
    return db.collection("bills").add(billData).then(function() {
      return billData;
    });
  }).then(function(billData) {
    billData.time = { toDate: function() { return new Date(); } };
    showInvoice(billData);
    currentItems = [];
    renderItems();
    document.getElementById("custName").value = "";
    document.getElementById("custPhone").value = "";
    document.getElementById("custAddress").value = "";
  }).catch(function(err) {
    alert("❌ Error saving bill: " + err.message);
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = "💾 Save & Generate Bill";
  });
}

// ---------- INVOICE MODAL ----------
function showInvoice(bill) {
  document.getElementById("invBillNo").textContent = "KM-" + String(bill.billNo).padStart(4, "0");
  var d = (bill.time && bill.time.toDate) ? bill.time.toDate() : new Date();
  document.getElementById("invDate").textContent = d.toLocaleString();
  document.getElementById("invCustName").textContent = bill.custName;
  document.getElementById("invCustPhone").textContent = bill.custPhone;
  var addrRow = document.getElementById("invAddressRow");
  if (bill.custAddress) {
    addrRow.style.display = "block";
    document.getElementById("invCustAddress").textContent = bill.custAddress;
  } else {
    addrRow.style.display = "none";
  }
  document.getElementById("invItemsBody").innerHTML = bill.items.map(function(it) {
    return "<tr><td>" + escapeHtml(it.name) + "</td><td>" + it.qty + "</td><td>" + it.unitPrice + "</td><td>" + it.subtotal + "</td></tr>";
  }).join("");
  document.getElementById("invGrandTotal").textContent = bill.total;
  document.getElementById("invoiceOverlay").style.display = "flex";
}

function closeInvoice() {
  document.getElementById("invoiceOverlay").style.display = "none";
}

// ---------- HISTORY ----------
function listenForBills() {
  if (unsubscribeBills) unsubscribeBills();
  unsubscribeBills = db.collection("bills").orderBy("billNo", "desc")
    .onSnapshot(function(snapshot) {
      allBills = snapshot.docs.map(function(doc) {
        var d = doc.data();
        d.id = doc.id;
        return d;
      });
      renderBills();
    }, function(err) {
      showMsg("dashMsg", "❌ Could not load bills: " + err.message, "error");
    });
}

function renderBills() {
  var q = document.getElementById("searchInput").value.trim().toLowerCase();
  var list = allBills.filter(function(b) {
    if (!q) return true;
    return (b.custName || "").toLowerCase().indexOf(q) !== -1 ||
           (b.custPhone || "").indexOf(q) !== -1;
  });

  var container = document.getElementById("billsList");
  if (list.length === 0) {
    container.innerHTML = '<p class="empty">No bills found.</p>';
    return;
  }

  container.innerHTML = list.map(function(b) {
    var timeStr = (b.time && b.time.toDate) ? b.time.toDate().toLocaleString() : "—";
    var del
