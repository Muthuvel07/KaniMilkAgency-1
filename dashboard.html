<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Console — Smart Security System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e12;
    --panel: #12181f;
    --grid-line: rgba(255,255,255,0.035);
    --border: rgba(255,255,255,0.09);
    --text: #e6edf0;
    --text-muted: #6b7785;
    --amber: #ffb020;
    --teal: #45d6c4;
    --danger-glow: rgba(255,176,32,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  body {
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 18px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ---------- Header ---------- */
  .console-header {
    max-width: 1100px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .radar {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(69,214,196,0.35);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .radar::before {
    content: "";
    position: absolute;
    inset: 0;
    background: conic-gradient(from 0deg, transparent 0deg, transparent 260deg, var(--teal) 300deg, transparent 300deg);
    animation: sweep 2.4s linear infinite;
  }
  .radar::after {
    content: "";
    position: absolute;
    inset: 40%;
    background: var(--teal);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--teal);
  }
  @keyframes sweep { to { transform: rotate(360deg); } }
  .brand-text .title {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .brand-text .subtitle {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }
  .header-right { display: flex; align-items: center; gap: 18px; font-size: 0.78rem; }
  .clock { color: var(--teal); font-weight: 500; }
  .arm-pill {
    padding: 4px 12px;
    border-radius: 3px;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--teal);
    color: var(--teal);
  }
  .arm-pill.disarmed { border-color: var(--text-muted); color: var(--text-muted); }
  .arm-pill.alert { border-color: var(--amber); color: var(--amber); }

  /* ---------- Alert strip ---------- */
  .alert-strip {
    max-width: 1100px;
    margin: 0 auto 16px;
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 500;
    background: rgba(69,214,196,0.06);
    border: 1px solid rgba(69,214,196,0.25);
    color: var(--teal);
    transition: all 0.25s ease;
  }
  .alert-strip.active {
    background: rgba(255,176,32,0.08);
    border-color: var(--amber);
    color: var(--amber);
    animation: throb 1.1s ease-in-out infinite;
  }
  @keyframes throb {
    0%, 100% { box-shadow: 0 0 0 0 var(--danger-glow); }
    50% { box-shadow: 0 0 0 6px transparent; }
  }

  /* ---------- Main grid ---------- */
  .main-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 16px;
  }
  @media (max-width: 760px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
  }
  .panel-label {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
  }

  /* Viewfinder framed snapshot */
  .viewfinder {
    position: relative;
    border-radius: 2px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .viewfinder img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .viewfinder .placeholder { color: var(--text-muted); font-size: 0.8rem; }
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--teal);
    border-style: solid;
    border-width: 0;
  }
  .corner.tl { top: 6px; left: 6px; border-top-width: 2px; border-left-width: 2px; }
  .corner.tr { top: 6px; right: 6px; border-top-width: 2px; border-right-width: 2px; }
  .corner.bl { bottom: 6px; left: 6px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner.br { bottom: 6px; right: 6px; border-bottom-width: 2px; border-right-width: 2px; }
  .rec-tag {
    position: absolute; top: 8px; left: 32px;
    font-size: 0.65rem; color: var(--amber);
    display: flex; align-items: center; gap: 5px;
  }
  .rec-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--amber);
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .timestamp-tag {
    position: absolute; bottom: 8px; right: 32px;
    font-size: 0.65rem; color: #c7d0d4;
  }

  .telemetry-row {
    display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;
  }
  .telemetry-item {
    flex: 1; min-width: 100px;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    font-size: 0.72rem;
  }
  .telemetry-item .k { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.64rem; }
  .telemetry-item .v { margin-top: 3px; font-size: 0.85rem; }
  .v.on { color: var(--amber); }
  .v.off { color: var(--text-muted); }

  /* Detection log */
  .log-list { max-height: 420px; overflow-y: auto; }
  .log-entry {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px dashed var(--border);
    font-size: 0.8rem;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .time { color: var(--text-muted); font-size: 0.72rem; }
  .log-entry .status-tag {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.03em;
  }
  .status-tag.unknown { background: rgba(255,176,32,0.12); color: var(--amber); }
  .status-tag.recognized { background: rgba(69,214,196,0.12); color: var(--teal); }
  .empty-note { color: var(--text-muted); font-size: 0.8rem; padding: 16px 0; text-align: center; }

  /* Stats strip */
  .stats-strip {
    max-width: 1100px; margin: 16px auto 0;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-box .num { font-size: 1.6rem; font-weight: 700; color: var(--teal); }
  .stat-box .num.warn { color: var(--amber); }
  .stat-box .lbl { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

  .actions { display: flex; gap: 10px; margin-top: 14px; }
  button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 3px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  button:hover { border-color: var(--teal); color: var(--teal); }
  button.danger:hover { border-color: var(--amber); color: var(--amber); }
</style>
</head>
<body>

<div class="console-header">
  <div class="brand">
    <div class="radar"></div>
    <div class="brand-text">
      <div class="title">Watch Console</div>
      <div class="subtitle">Smart Security System — live feed</div>
    </div>
  </div>
  <div class="header-right">
    <span class="clock mono" id="clock">--:--:--</span>
    <span class="arm-pill mono" id="armPill">ARMED</span>
  </div>
</div>

<div class="alert-strip mono" id="alertStrip">SYSTEM NOMINAL — no motion detected</div>

<div class="main-grid">
  <div class="panel">
    <div class="panel-label"><span>Live Capture</span><span id="camLabel">CAM 01</span></div>
    <div class="viewfinder">
      <img id="snapshotImg" src="" style="display:none;" alt="Latest snapshot">
      <span class="placeholder" id="camPlaceholder">Awaiting first capture...</span>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="rec-tag"><span class="rec-dot"></span>REC</div>
      <div class="timestamp-tag mono" id="camTimestamp"></div>
    </div>
    <div class="telemetry-row">
      <div class="telemetry-item">
        <div class="k">Motion</div>
        <div class="v mono" id="tPir">OFF</div>
      </div>
      <div class="telemetry-item">
        <div class="k">Buzzer</div>
        <div class="v mono" id="tBuzzer">OFF</div>
      </div>
      <div class="telemetry-item">
        <div class="k">Last Event</div>
        <div class="v mono" id="tLast" style="font-size:0.72rem;">--</div>
      </div>
    </div>
    <div class="actions">
      <button id="testBtn">Test buzzer</button>
      <button class="danger" id="armBtn">Arm / Disarm</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label"><span>Detection Log</span><span id="logCount">0 entries</span></div>
    <div class="log-list" id="logList">
      <div class="empty-note">No detections logged yet.</div>
    </div>
  </div>
</div>

<div class="stats-strip">
  <div class="stat-box"><div class="num" id="statToday">0</div><div class="lbl">Today</div></div>
  <div class="stat-box"><div class="num warn" id="statUnknown">0</div><div class="lbl">Unknown faces</div></div>
  <div class="stat-box"><div class="num" id="statWeek">0</div><div class="lbl">This week</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // ---- Firebase config: match your project's SDK values ----
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "your-project.firebaseapp.com",
    databaseURL: "https://your-project-default-rtdb.firebaseio.com",
    projectId: "your-project",
    storageBucket: "your-project.appspot.com",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ---- Live clock ----
  function tickClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ---- Live status listener: /security/... ----
  db.ref('/security').on('value', (snap) => {
    const d = snap.val() || {};
    const alertStrip = document.getElementById('alertStrip');
    const armPill = document.getElementById('armPill');

    setTel('tPir', d.pir);
    setTel('tBuzzer', d.buzzer);
    document.getElementById('tLast').textContent = d.lastTrigger || '--';

    if (d.pir) {
      alertStrip.textContent = 'MOTION DETECTED — reviewing capture';
      alertStrip.classList.add('active');
      armPill.textContent = 'ALERT';
      armPill.className = 'arm-pill mono alert';
    } else {
      alertStrip.textContent = 'SYSTEM NOMINAL — no motion detected';
      alertStrip.classList.remove('active');
      armPill.textContent = d.armed === false ? 'DISARMED' : 'ARMED';
      armPill.className = 'arm-pill mono' + (d.armed === false ? ' disarmed' : '');
    }

    if (d.snapshotUrl) {
      document.getElementById('snapshotImg').src = d.snapshotUrl;
      document.getElementById('snapshotImg').style.display = 'block';
      document.getElementById('camPlaceholder').style.display = 'none';
      document.getElementById('camTimestamp').textContent = new Date().toLocaleTimeString();
    }
  });

  function setTel(id, value) {
    const el = document.getElementById(id);
    el.textContent = value ? 'ON' : 'OFF';
    el.className = 'v mono ' + (value ? 'on' : 'off');
  }

  // ---- Detection log: /events/... ----
  db.ref('/events').limitToLast(30).on('value', (snap) => {
    const events = snap.val() || {};
    const ids = Object.keys(events).sort((a, b) => (events[b].timestamp || 0) - (events[a].timestamp || 0));
    const logList = document.getElementById('logList');
    document.getElementById('logCount').textContent = ids.length + ' entries';

    if (ids.length === 0) {
      logList.innerHTML = '<div class="empty-note">No detections logged yet.</div>';
    } else {
      logList.innerHTML = '';
      ids.forEach(id => {
        const ev = events[id];
        const time = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : '--:--';
        const row = document.createElement('div');
        row.className = 'log-entry';
        row.innerHTML = `
          <span class="time mono">${time}</span>
          <span>${ev.locationName || 'Main entrance'}</span>
          <span class="status-tag mono ${ev.status === 'recognized' ? 'recognized' : 'unknown'}">
            ${ev.status === 'recognized' ? (ev.personName || 'Known') : 'Unknown'}
          </span>
        `;
        logList.appendChild(row);
      });
    }

    // Stats
    const todayStart = new Date().setHours(0,0,0,0);
    const weekStart = todayStart - 6 * 86400000;
    let today = 0, week = 0, unknown = 0;
    Object.values(events).forEach(ev => {
      const t = ev.timestamp || 0;
      if (t >= todayStart) today++;
      if (t >= weekStart) week++;
      if (ev.status !== 'recognized' && t >= todayStart) unknown++;
    });
    document.getElementById('statToday').textContent = today;
    document.getElementById('statWeek').textContent = week;
    document.getElementById('statUnknown').textContent = unknown;
  });

  // ---- Actions ----
  document.getElementById('testBtn').addEventListener('click', () => {
    db.ref('/security/command').set({ action: 'test_buzzer', ts: Date.now() });
  });
  document.getElementById('armBtn').addEventListener('click', () => {
    db.ref('/security/armed').once('value', (snap) => {
      db.ref('/security/armed').set(!snap.val());
    });
  });
</script>
</body>
</html>
