<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kani Milk Agency - E-Billing</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0faf0;}
header{background:linear-gradient(135deg,#087f23,#1b5e20);color:white;text-align:center;padding:26px 20px;}
header h1{font-size:1.6rem;font-weight:700;}
header p{font-size:0.9rem;opacity:0.85;margin-top:6px;}
.search-section{max-width:480px;margin:0 auto;padding:24px 20px;}
.search-card{background:white;padding:22px;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);display:flex;gap:10px;flex-wrap:wrap;}
.search-card input{flex:1;min-width:180px;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:0.95rem;}
.search-card input:focus{outline:none;border-color:#087f23;}
.search-card button{background:#087f23;color:white;border:none;padding:12px 20px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;}
.search-card button:hover{background:#1b5e20;}
.msg{max-width:480px;margin:0 auto 16px;padding:12px 16px;border-radius:10px;font-size:0.9rem;text-align:center;}
.msg.error{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;}
.msg.info{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}
.results{max-width:600px;margin:0 auto;padding:0 20px 60px;}
.summary{background:white;border-radius:16px;padding:18px 22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.summary div span{display:block;font-size:1.5rem;font-weight:700;color:#087f23;}
.summary div label{font-size:0.78rem;color:#555;}
.bill-card{background:white;border-radius:16px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:14px;}
.bill-card .row{display:flex;justify-content:space-between;font-size:0.9rem;color:#333;padding:4px 0;border-bottom:1px solid #f2f2f2;}
.bill-card .row:last-of-type{border-bottom:none;}
.bill-card .amount{font-weight:700;color:#087f23;}
.bill-card .time{color:#888;font-size:0.78rem;margin-top:6px;}
.print-btn{margin-top:10px;background:#e8f5e9;color:#087f23;border:1.5px solid #a5d6a7;padding:8px 14px;border-radius:8px;font-size:0.85rem;cursor:pointer;}
.print-btn:hover{background:#087f23;color:white;}
.empty{text-align:center;color:#777;padding:40px 0;}
@media(max-width:600px){
  .search-card{flex-direction:column;}
}
</style>
</head>
<body>

<header>
  <h1>🧾 Kani Milk Agency</h1>
  <p>E-Billing — Individual Order Bills</p>
</header>

<section class="search-section">
  <div class="search-card">
    <input id="searchPhone" type="tel" placeholder="Enter phone number" maxlength="10">
    <button onclick="lookupBills()">Search</button>
  </div>
</section>

<div id="lookupMsg" class="msg" style="display:none;"></div>

<section class="results">
  <div id="summaryBox" style="display:none;" class="summary">
    <div><span id="billCount">0</span><label>Orders Found</label></div>
    <div><span id="billTotal">₹0</span><label>Total Amount</label></div>
  </div>
  <div id="billsList"></div>
</section>

<!-- Connects directly to the same Firestore database used by the order form.
     This page is standalone: no link to/from index.html anywhere. -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAQAY_wXDlU5twKU9DLZCh3lgfBfLAy7AQ",
  authDomain: "kani-milk-agency-9323b.firebaseapp.com",
  projectId: "kani-milk-agency-9323b",
  storageBucket: "kani-milk-agency-9323b.firebasestorage.app",
  messagingSenderId: "317392951345",
  appId: "1:317392951345:web:1768ca6b7725812491dd10"
});
var db = firebase.firestore();

// Same price table as the main site's admin dashboard — keep these in sync
// whenever prices change.
var PRICE_MAP = {
  "Jersey Gold Milk":       { price: 76, unit: "L" },
  "Blue Toned Milk":        { price: 59, unit: "L" },
  "Fresh Curd":             { price: 88, unit: "kg" },
  "Ice Cream":              { price: 50, unit: "unit" },
  "Full Cream Toned Milk":  { price: 76, unit: "L" }
};

function parseQuantityValue(qtyStr) {
  if (!qtyStr) return 0;
  var str = String(qtyStr).toLowerCase();
  var match = str.match(/(\d+(\.\d+)?)/);
  if (!match) return 0;
  var num = parseFloat(match[1]);
  if (str.indexOf("ml") !== -1) return num / 1000;
  if (str.indexOf("kg") !== -1) return num;
  if (str.indexOf("g") !== -1) return num / 1000;
  return num;
}

function calculateOrderAmount(order) {
  var priceInfo = PRICE_MAP[order.product];
  if (!priceInfo) return 0;
  return priceInfo.price * parseQuantityValue(order.quantity);
}

function escapeHtml(str) {
  if (str === undefined || str === null) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function showMsg(text, type) {
  var el = document.getElementById("lookupMsg");
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
}

function hideMsg() {
  document.getElementById("lookupMsg").style.display = "none";
}

function lookupBills() {
  var phone = document.getElementById("searchPhone").value.trim();
  if (!/^\d{10}$/.test(phone)) {
    showMsg("⚠️ Enter a valid 10 digit phone number.", "error");
    document.getElementById("summaryBox").style.display = "none";
    document.getElementById("billsList").innerHTML = "";
    return;
  }
  hideMsg();
  showMsg("🔎 Searching...", "info");

  db.collection("orders").where("phone", "==", phone).orderBy("time", "desc").get()
    .then(function(snapshot) {
      var orders = snapshot.docs.map(function(doc) {
        var d = doc.data(); d.id = doc.id; return d;
      });
      renderBills(orders);
    })
    .catch(function(err) {
      showMsg("❌ " + err.message, "error");
    });
}

function renderBills(orders) {
  if (orders.length === 0) {
    hideMsg();
    document.getElementById("summaryBox").style.display = "none";
    document.getElementById("billsList").innerHTML = '<p class="empty">No orders found for this number.</p>';
    return;
  }
  hideMsg();

  var total = 0;
  var html = orders.map(function(o) {
    var amount = calculateOrderAmount(o);
    total += amount;
    var timeStr = (o.time && o.time.toDate) ? o.time.toDate().toLocaleString() : "—";
    var rate = PRICE_MAP[o.product];

    return (
      '<div class="bill-card">' +
        '<div class="row"><span>Product</span><span>' + escapeHtml(o.product) + '</span></div>' +
        '<div class="row"><span>Quantity</span><span>' + escapeHtml(o.quantity) + '</span></div>' +
        (rate ? '<div class="row"><span>Rate</span><span>₹' + rate.price + ' / ' + escapeHtml(rate.unit) + '</span></div>' : '') +
        '<div class="row"><span>Status</span><span>' + escapeHtml(o.status || "Pending") + '</span></div>' +
        '<div class="row"><span>Amount</span><span class="amount">₹' + amount.toFixed(2) + '</span></div>' +
        '<div class="time">' + timeStr + ' &middot; Order #' + o.id.slice(-6).toUpperCase() + '</div>' +
        '<button class="print-btn" onclick="printBill(' + JSON.stringify(o).replace(/"/g, "&quot;") + ')">🖨️ Print This Bill</button>' +
      '</div>'
    );
  }).join("");

  document.getElementById("billsList").innerHTML = html;
  document.getElementById("billCount").textContent = orders.length;
  document.getElementById("billTotal").textContent = "₹" + total.toFixed(2);
  document.getElementById("summaryBox").style.display = "flex";
}

function printBill(order) {
  var amount = calculateOrderAmount(order);
  var timeStr = (order.time && order.time.seconds)
    ? new Date(order.time.seconds * 1000).toLocaleString()
    : "—";
  var rate = PRICE_MAP[order.product];

  var w = window.open("", "_blank");
  w.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bill</title><style>' +
    'body{font-family:Arial,sans-serif;max-width:420px;margin:20px auto;color:#222;}' +
    'h2{color:#087f23;text-align:center;margin-bottom:4px;}' +
    '.sub{text-align:center;color:#666;font-size:0.85rem;margin-bottom:20px;}' +
    'table{width:100%;border-collapse:collapse;margin-bottom:14px;}' +
    'td{padding:6px 4px;font-size:0.92rem;border-bottom:1px solid #eee;}' +
    '.label{color:#666;width:40%;}' +
    '.total{font-size:1.15rem;font-weight:700;color:#087f23;border-top:2px solid #087f23;padding-top:10px;}' +
    '.foot{text-align:center;color:#888;font-size:0.8rem;margin-top:20px;}' +
    '@media print{button{display:none;}}' +
    '</style></head><body>' +
    '<h2>🥛 Kani Milk Agency</h2>' +
    '<p class="sub">Order Receipt &middot; #' + escapeHtml((order.id || "").slice(-6).toUpperCase()) + '</p>' +
    '<table>' +
      '<tr><td class="label">Date</td><td>' + escapeHtml(timeStr) + '</td></tr>' +
      '<tr><td class="label">Customer</td><td>' + escapeHtml(order.name) + '</td></tr>' +
      '<tr><td class="label">Phone</td><td>' + escapeHtml(order.phone) + '</td></tr>' +
      '<tr><td class="label">Address</td><td>' + escapeHtml(order.address) + '</td></tr>' +
      '<tr><td class="label">Product</td><td>' + escapeHtml(order.product) + '</td></tr>' +
      '<tr><td class="label">Quantity</td><td>' + escapeHtml(order.quantity) + '</td></tr>' +
      (rate ? '<tr><td class="label">Rate</td><td>₹' + rate.price + ' / ' + escapeHtml(rate.unit) + '</td></tr>' : '') +
    '</table>' +
    '<table><tr><td class="total">Total</td><td class="total" style="text-align:right;">₹' + amount.toFixed(2) + '</td></tr></table>' +
    '<p class="foot">Thank you for choosing Kani Milk Agency!</p>' +
    '<button onclick="window.print()" style="display:block;margin:20px auto;background:#087f23;color:white;border:none;padding:12px 24px;border-radius:10px;font-size:0.95rem;cursor:pointer;">🖨️ Print</button>' +
    '</body></html>'
  );
  w.document.close();
}
</script>
</body>
  </html>
